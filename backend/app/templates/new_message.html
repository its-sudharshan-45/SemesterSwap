<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; color: #334155; margin: 0; padding: 0; background-color: #f8fafc; }
    .container { max-width: 580px; margin: 30px auto; padding: 24px; background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .header { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); padding: 20px; border-radius: 12px; text-align: center; color: #ffffff; margin-bottom: 24px; }
    .header h2 { margin: 0; font-size: 20px; font-weight: 800; }
    .preview-box { background-color: #f8fafc; border-left: 4px solid #6366f1; padding: 14px 18px; border-radius: 4px; margin: 16px 0 24px 0; font-style: italic; font-size: 14px; color: #475569; }
    .btn { display: inline-block; background-color: #4f46e5; color: #ffffff; text-decoration: none; padding: 12px 24px; font-weight: 700; font-size: 14px; border-radius: 10px; text-align: center; }
    .footer { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>New Message Received</h2>
    </div>
    <p style="font-size: 15px; margin-top: 0;">Hello <strong>{recipientName}</strong>,</p>
    <p style="font-size: 14px; margin-bottom: 0;">You received a new message from <strong>{senderName}</strong> regarding <strong>{productName}</strong>.</p>
    
    <div class="preview-box">
      "{messageSnippet}"
    </div>

    <p style="font-size: 12px; color: #94a3b8; margin-bottom: 24px;">Sent At: {timestamp}</p>

    <div style="text-align: center;">
      <a href="{FRONTEND_URL}/chat/{conversationId}" class="btn">Reply In Chat</a>
    </div>

    <div class="footer">
      Regards,<br>SemesterSwap Team
    </div>
  </div>
</body>
</html>
